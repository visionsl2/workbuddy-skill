# 实施计划配置
# Implementation Plan Configuration

section:
  id: "implementation"
  title: "6. 实施计划"
  description: "项目周期、实施阶段、质量保障、风险应对"

# 数据字段映射
data_mapping:
  overview:
    type: "text"
    source: "implementation_plan.overview"
    description: "项目周期概述"
    default: "项目总工期X个月，采用分阶段迭代交付模式"
    
  phases:
    type: "list_object"
    source: "implementation_plan.phases"
    description: "实施阶段列表"
    default: []
    fields:
      - name: "phase_no"
        description: "阶段编号"
      - name: "phase_name"
        description: "阶段名称"
      - name: "duration"
        description: "工期"
      - name: "deliverables"
        description: "主要交付物列表"
      - name: "milestone"
        description: "里程碑"
        
  quality_control:
    type: "list"
    source: "implementation_plan.quality_control"
    description: "质量保障措施"
    default: []
    
  risks_and_mitigation:
    type: "list_object"
    source: "implementation_plan.risks_and_mitigation"
    description: "风险与应对"
    default: []
    fields:
      - name: "risk"
        description: "风险项"
      - name: "mitigation"
        description: "应对措施"

# 表格配置
phases_table_config:
  headers:
    - "阶段"
    - "名称"
    - "工期"
    - "主要交付物"
    - "里程碑"
  col_widths: [1.2, 2.5, 1, 3.5, 2]

risks_table_config:
  headers:
    - "风险项"
    - "应对措施"
  col_widths: [4, 7]
